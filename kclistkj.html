<script>
    function checkShowNotice() {
        const notice = $("#always_show_notice");
        if (!notice) {
            return;
        }
        if (!$.cookie('always_show_notice')) {
            // cookies不存在，显示公告
            return;
        }
        // cookies存在，不显示公告
        notice.remove();
    }

    function checkShowDialog() {
        // 判断带有class=l_todo_list的ul标签下是否还有其他li标签。
        if ($("ul.l_todo_list").children().length === 0) {
            return;
        }
        $("#conditionDialog").show();
    }

    function specialHandle(field) {
        const countDown = $('#countDown')
        countDown.hide();

        if (field === 'tcnrxzkcxx') {
            showReadDialog();
            countDown.show();
            return;
        }

        if (field === 'always_show_notice') {
            // 设置cookie设置，过期时间为一天。
            $.cookie('always_show_notice', '1', {expires: 1, path: '/'});
            return;
        }
    }

    jQuery.ajax({
        type: "get",
        url: "/course-v2/studyApp/denyLearning",
        dataType: "json",
        async: false,
        success: function (data) {
            if (data.status) {
                if (data.code !== "1") {
                    const content = '<p>您的学籍状态为:【' + data.msg + '】</p><p>暂时不能参与教学活动，如有疑问请联系管理员</p>'
                    $("#dialog_content").html(content);
                    $("#statusDialog").show();
                    return;
                }
                // 富文本
                const content = "<div class='richtext'></div>"
                $("#dialog_content").html(content);
                $("#statusDialog").show();
                RichTextUitl.loadDetailPageProfile(true, true, false, false, true);
                <!-- 富文本内容渲染到页面之前进行的操作-->
                var rtf_content = RichTextUitl.beforeSetRtfContent(data.msg);

                if (rtf_content !== '') {
                    $('.richtext').html(rtf_content);
                    <!-- 富文本内容渲染到页面之后进行的操作-->
                    RichTextUitl.afterPageRendered($('.richtext')[0]);
                }
                return;
            }

            checkShowNotice();
            checkShowDialog();
        }
    });

    function changeIsDownload() {
        const args = {"student_num": "2026070943039"}
        $.post("/course-v2/tjpz/changeSfxzwd", args, function (data) {
            if (!data.status) {
                alert(data.msg);
            }
        });
    }

    let timer = null;

    function showReadDialog() {
        let countNum = 5
        // 倒计时
        const countDown = $('#countDown')
        // 重置
        countDown.html(`我已知晓（${countNum}s）`)
        countDown.removeClass('blue').addClass('gray');
        countDown.off('click');

        timer = setInterval(() => {
            countNum--
            countDown.html(`我已知晓（${countNum}s）`)
            if (!countNum) {
                clearInterval(timer)
                countDown.html(`我已知晓`)
                countDown.removeClass('gray').addClass('blue');
                // 添加点击方法
                countDown.click(function () {
                    $.cookie('tcnrxzkcxx', '1', {path: "/"})
                    closeRichtextDialog();
                })
            }
        }, 1000)
    }

    function showRichtextDialog(field, url) {
        $(".richtext_condition").html($("#richtext_" + field).html());
        uParse(".richtext_condition");
        $("#richtext_go_url").hide();
        if (url !== '') {
            $("#richtext_go_url").attr("href", url);
            $("#richtext_go_url").show();
        }
        specialHandle(field);
        $("#richtextDialog").show();
    }

    function closeRichtextDialog() {
        $("#richtextDialog").hide();
        clearInterval(timer)
    }

    function checkResult() {
        jQuery.ajax({
            type: "POST",
            url: "/course-v2/studyApp/check-study-condition",
            data: {
                "student_num": '2026070943039',
                "enc": 'e177ba477f512a3e5f08961f35fa35eb'
            },
            dataType: 'json',
            success: function (data) {
                if (!data.status) {
                    alert(data.msg);
                    return;
                }
                const dataList = data.data;
                if (dataList.length === 0) {
                    $("#conditionDialog").hide();
                    return;
                }

                // 遍历dataList
                for (let i = 0; i < dataList.length; i++) {
                    const item = dataList[i];
                    if (item.isqzzx === 1) {
                        alert("请先完成事务：" + item.tjms);
                        return;
                    }
                }
                $("#conditionDialog").hide();
            },
            error: function () {
                alert("网络繁忙，请稍后重试！");
            }
        });
    }
</script>

            var url = $(this).attr('href');
            var title = $(this).attr('title');
            if (title == undefined) {
                title = "";
            }
            if (url != undefined && url.indexOf("#") == -1 &&
                    url.indexOf("void") == -1 && url.indexOf(":;") == -1) {
                $(this).attr('href', "javascript:;");
                $(this).attr('onclick', "OpenUrl('" + url + "','" + title + "')");

        });

    <script type="text/javascript">
        Ext.Ajax.autoAbort = true;

        var timer,
            percent=0,
            isNewTopic = parent.isNewTopic,
            listener = {onInit:Ext.emptyFn},
            setting = parent.AttachmentSetting || {},
            defaultSetting = setting.defaults || {},
            userId=defaultSetting.userid || '',
            courseid = defaultSetting.courseid || '',
            classId = defaultSetting.clazzId || '',
            jobid = config('jobid') || '',
            objectid = config('objectid'),
            name = config('name'),
            fastforward = config('fastforward') == 'true',
            isTeacher = top.location.href.indexOf("teacherstudy") > 0 || top.location.href.indexOf("course/phone/chapterdata") > 0 || top.location.href.indexOf("mycourse/tch") > 0 || parent.parent.location.href.indexOf("teacherstudy") > 0,
            nodoublespeed = config('doublespeed') == 'false',
            duration,
            iframe =  window.frameElement,
            frameData = Ext.decode(iframe.getAttribute('data')),
            _jobid = frameData._jobid,
            _mid = frameData.mid;
        var ut = "s";
        try {
            ut  = (parent.parent.location.pathname.indexOf('teacherstudy') != -1 || parent.parent.location.pathname.indexOf('mycourse/tch') != -1) || setting.ut == 't' ? 't' : 's';
        } catch (e) {

        Ext.isIpad = (navigator.userAgent.indexOf('iPad') > -1);

        function greenligth(){
            Ext.fly(window.frameElement).parent().addCls('ans-job-finished');
            greenLightSetAriaLabel();
        }

        // 无障碍任务点完成读取支持
        function greenLightSetAriaLabel() {
            try {
                // 获取视频iframe当前窗口所在的父元素
                var parentDiv = Ext.fly(window.frameElement).parent();
                if (parentDiv) {
                    // 在父元素中查找类名为ans-job-icon的子元素
                    var jobIconDiv = parentDiv.down('.ans-job-icon');
                    if (jobIconDiv) {
                        // 任务点完成无障碍读取支持
                        jobIconDiv.set({'aria-label': '任务点已完成'});
                    }
                }
            } catch (e) {
                console.log(e)
            }
        }

        function proxy_completed(){
            greenligth();

            if(ed_complete){
                ed_complete();
            }
        }

        function config(d) {
            return window.frameElement.getAttribute(d);
        }

        function subString(str, len, hasDot) {
            var newLength = 0;
            var newStr = "";
            var chineseRegex = /[^\x00-\xff]/g;
            var singleChar = "";
            var strLength = str.replace(chineseRegex,"**").length;
            for(var i = 0;i < strLength;i++)
            {
                singleChar = str.charAt(i).toString();
                if(singleChar.match(chineseRegex) != null)
                {
                    newLength += 2;
                }
                else
                {
                    newLength++;
                }
                if(newLength > len)
                {
                    break;
                }
                newStr += singleChar;
            }

            if(hasDot && strLength > len)
            {
                newStr += "...";
            }
            return newStr;
        }
        function GetQueryString(name)
        {
            var reg = new RegExp("(^|&)"+ name +"=([^&]*)(&|$)");
            var r = top.location.search.substr(1).match(reg);
            if(r!=null)return  unescape(r[2]); return null;
        }
        function setTopicName(list) {
            if(list && list.length > 0){
                $(".audio_knowledgePoint_tit").html((langMap.knowledgePoint || '知识点') + ':');
                var spanList = "";
                for (var i = 0, len = list.length; i < len; i++) {
                    var spanListItem = '<div class="topicItem"><div class="knowledgePointNameWrap" topicid="' + list[i].id + '"><span class="knowledgePointName" title="' + list[i].name + '">' + list[i].name + '</span>';
                    spanListItem += '</div></div>';
                    spanList += spanListItem;
                }
                spanList += '<p class="clear"></p>';
                $("#topicContent").html(spanList);
                $(".audio_knowledgePoint").css("display","block");
                var height = $(".audio_container").height();
                window.frameElement.style.setProperty('height', height + 'px', 'important');
            }
        }

        function showPlayer(oData) {
            oData.filename = subString(oData.filename,32,true),
                duration = oData.duration;

            if(top.dtype =="ZT" || top.dtype =="HB" || top.dtype =="MAG"){
                oData.http = oData.http.replace(/s1.ananas.chaoxing.com/, 'zt.rhky.com');
            }

            var paras = {
                enableFastForward : fastforward ? 0 : 1,
                duration: duration,
                http: oData.http,
                filename: name == "" ? oData.filename : name,
                dtoken:oData.dtoken,
                doublespeed:nodoublespeed ? 0 : 1
            };
            if (oData.duration) {
                paras.audioTotalTime = oData.duration;
            }
            paras.control = setting && setting.control;
            if (isTeacher) {
                paras.control = false;
            }

            var m={},s,vb,ve;

            if (setting && setting.control) {
                var attachments = setting.attachments,
                    defaults = setting.defaults,
                    spec = oData.objectid + "-" + jobid;

                if (defaults) {
                    paras.userid = defaults.userid || '';
                    paras.fid = defaults.fid || '';
                }

                for(var i=0;i<attachments.length;i++){
                    m = attachments[i];
                    var mObjId = m.objectId || m.property.objectid;
                    var mJobId = m.jobid || m.property.jobid || '';
                    s = mObjId + "-" + mJobId;

                    if(spec == s){
                        Ext.apply(paras,setting.defaults);

                        paras.headOffset = m.headOffset?Math.floor(parseInt(m.headOffset)/1000):0;
                        paras.objectId = mObjId;
                        paras.otherInfo = m.otherInfo;
                        paras.isPassed = m.isPassed;

                        if (jobid) {
                            paras.jobid = jobid;
                            if (!m.job) {

                                if(!isTeacher) {
                                    greenligth();
                                    paras.isPass = true;
                                }

                                ed_complete = false;
                                paras.enableFastForward = 1;
                                paras.enableSwitchWindow = 1;
                            }
                        }
                        if (paras.audioTotalTime < 30) {
                            paras.headOffset = 0;
                        } else {
                            if (m.playTime) {
                                if (m.headOffset == m.playTime && m.headOffset == paras.audioTotalTime * 1000) {
                                    paras.headOffset = 0;
                                } else {
                                    paras.headOffset = Math.floor(parseInt(m.playTime) / 1000);
                                }
                            } else {
                                paras.headOffset = 0;
                            }
                        }

                        paras.reportUrl = paras.reportUrl && paras.reportUrl.replace("http://", window.location.protocol+"//");
                        window._jobindex = i;
                        break;
                    }
                }
            }

            // course ignoreVideoCtrl
            if (paras.ignoreVideoCtrl == 1) {
                paras.enableFastForward = 1;
            }

            // course state
            if (paras.state == 1) {
                delete paras.reportUrl;
            }

            if (!paras.control || isTeacher) {
                ed_complete = false;
                paras.enableFastForward = 1;
                paras.headOffset = 0;
            }

            if (paras.isPassed || paras.headOffset > paras.audioTotalTime * 0.95) {
                paras.headOffset = 0;
            }


            Ext.get('reader').setHTML('<audio id="audio" class="video-js vjs-default-skin vjs-big-play-centered" ></audio>');

            new ans.AudioJsNew({
                videojs :  'audio',
                params : paras
            });
            setTimeout(function() {
                try {
                    var curFrame = window.frameElement;
                    if (curFrame.className && curFrame.className.indexOf("scrollAttachItem") > -1) {
                        $("#reader .video-js").addClass("yellowBorder");
                    }
                } catch (e) {
                }
            }, 1000)
            document.getElementsByTagName('audio')[0].addEventListener('play',function(){
                var iframearray = parent.document.getElementsByTagName("iframe");
                for (var i=0; i<iframearray.length; i++){
                    if (iframearray[i].getAttribute("src") && iframearray[i].getAttribute("src").indexOf("microCourse") != -1) {
                        var item = iframearray[i].contentWindow.document.getElementsByTagName("iframe")[0].contentWindow;
                        item.PageView.stopAll && item.PageView.stopAll();
                    }
                }
            })
            var attachments = setting.attachments;
            for (var i = 0; i < attachments.length; i++) {
                m = attachments[i];

                if (m.property && m.property._jobid == _jobid && m.property.mid == _mid) {
                    if (m.topicList) {
                        setTopicName(m.topicList);
                    }
                    break;
                }
            }

            if (isNewTopic == "true") {
                var hoverSet = new Set();
                var topicOnHover = $('.knowledgePointNameWrap[topicid]');
                topicOnHover.on('mouseover', function () {
                    var _this = $(this);
                    var topicId = _this.attr("topicid");
                    if (hoverSet.has(topicId)) {
                        return;
                    }
                    hoverSet.add(topicId);
                    var nameCacheAttribute = "fulltopicpath";
                    if (_this[0].hasAttribute(nameCacheAttribute)) {
                        appendHover(_this, topicId, _this.attr(nameCacheAttribute));
                        return;
                    }
                    $.ajax({
                        type: "get",
                        url: "/mooc-ans/coursedata/get-full-topic-path",
                        dataType: "json",
                        data: {
                            "courseId": courseid,
                            "topicId": topicId,
                            "classId": classId,
                            "ut": ut,
                        },
                        success: function (data) {
                            if (data.status) {
                                var topicName = data.msg || "";
                                appendHover(_this, topicId, topicName);
                                _this.attr("fulltopicpath", topicName);
                            }
                        }
                    });
                });

                topicOnHover.on('mouseout', function () {
                    var topicId = $(this).attr("topicId")
                    hoverSet.delete(topicId);
                    $('[id^="hover_"]').remove();
                });
            }

            function appendHover(_this, topicId, topicName) {
                var hoverId = "hover_" + topicId;
                var hoverHtml = "<div id='" + hoverId + "' class='selectDivHover' style='display: none'><div class='selectDivHoverArrow'></div>无父级节点</div>"
                if (topicName) {
                    hoverHtml = "<div id='" + hoverId + "' class='selectDivHover' style='display: none'><div class='selectDivHoverArrow'></div>父级节点：<div></div></div>"
                }
                if (!hoverSet.has(topicId)) {
                    return;
                }
                $("body").append(hoverHtml);
                var hoverElement = $("#" + hoverId);
                hoverElement.children("div").eq(1).text(unescapeHTML(topicName));
                var maxWidth = hoverElement.parent()[0].getBoundingClientRect().width;
                if (maxWidth && maxWidth > 0) {
                    hoverElement.css("max-width", maxWidth);
                }
                var rect = _this[0].getBoundingClientRect();
                var borderWidth = parseInt(hoverElement.find(".selectDivHoverArrow").css("border-width"));
                var top = rect.bottom + borderWidth * 2;
                var hoverOuterWidth = hoverElement.outerWidth(true);
                var left = rect.left + (rect.width - hoverOuterWidth) / 2;
                if (left < 0) {
                    left = 0;
                    var offset = hoverOuterWidth - (rect.right - rect.width / 2 - borderWidth);
                    if (offset < 0) {
                        offset = borderWidth * 2;
                    }
                    hoverElement.find(".selectDivHoverArrow").css("left", offset + "px");
                }
                if (left + hoverOuterWidth > window.innerWidth) {
                    left = window.innerWidth - hoverOuterWidth;
                    var offset = rect.right - rect.width / 2 - borderWidth - left;
                    if (offset > hoverOuterWidth) {
                        offset = hoverOuterWidth - borderWidth * 2;
                    }
                    hoverElement.find(".selectDivHoverArrow").css("left", offset + "px");
                } else {
                    hoverElement.find(".selectDivHoverArrow").css("left", (rect.left - left + rect.width / 2 - borderWidth) + "px");
                }
                if (top + hoverElement.outerHeight(true) <= window.innerHeight) {
                    hoverElement.css({
                        top: top + "px",
                        left: left + "px"
                    })
                } else {
                    hoverElement.find("div").first().removeClass("selectDivHoverArrow");
                    hoverElement.find("div").first().addClass("selectDivHoverArrowBottom");
                    hoverElement.css({
                        bottom: window.innerHeight - rect.top + borderWidth * 2 + "px",
                        left: left + "px"
                    })
                }
                hoverElement.show();
            }

            function unescapeHTML(str) {
                return str.replace(/&lt;|&gt;|&amp;|&quot;|&#39;/g, function (a) {
                    return {
                        '&lt;': '<',
                        '&gt;': '>',
                        '&amp;': '&',
                        '&quot;': '"',
                        '&#39;': "'"
                    }[a];
                });
            }
        }

        function request() {
            var note = Ext.get('note'),
                note1Wrap = Ext.get('note1-wrap'),
                note1 = Ext.get('note1');
            var hl = Ext.get('hl');
            if(percent<=100){
                hl.setWidth((percent+=5)+"%");
            }
            if (!objectid) {
                return ;
            }

            //Ext.get('objectid').setHTML('(文件ID:' + objectid + ')');

            Ext.Ajax.request({
                url : '/ananas/status/' + objectid,
                success : function(response){
                    eval("var data = " + response.responseText);
                    Ext.get('loading').hide();

                    switch(data.status){
                        case 'success':
                            Ext.getBody().removeCls('mask');
                            note1Wrap.remove();
                            showPlayer(data);
                            timer && clearInterval(timer);
                            sendReadZTMediaLog(0);
                            break;

                        case 'failed':
                            timer && clearInterval(timer);
                            note1Wrap.remove();
                            note.show();
                            break;

                        case 'waiting':
                            note1Wrap.update('<div class="line1"><div class="line3"></div><div><p class="tipStyle making">音频正在转码，您无需在此页面等待【9001】</p>');
                            break;
                        case 'converting':
                        case 'transfer':
                            note1Wrap.update('<div class="line1"><div class="line2"></div></div><p class="tipStyle">音频上传中【9002】</p>');
                            break;
                    }
                },
                failure : function(resp){
                    if(resp.status == 0){
                        timer &&　clearInterval(timer);
                        note1Wrap.update('<div class="line1"><div class="line2"></div></div><p class="tipStyle">音频加载失败，请刷新页面重试【9003】</p>');
                        Ext.get('loading').hide();
                    } else {
                        timer &&　clearInterval(timer);
                        note1Wrap.update('<div class="line1"><div class="line3"></div></div><p class="tipStyle">文件加载失败，请稍后再试【9004】</p>');
                        Ext.get('loading').hide();
                    }
                }
            });
        }

        var playLogTimer;
        function sendReadZTMediaLog(st) {
            try {
                var GetQueryString = function(name){
                    var reg = new RegExp("(^|&)"+ name +"=([^&]*)(&|$)");
                    var r = parent.location.search.substr(1).match(reg);
                    if(r!=null)return  unescape(r[2]); return null;
                };
                var setting = parent.AttachmentSetting;
                if(!setting){
                    return;
                }
                var isFiled = setting.defaults.isFiled;
                var state = setting.defaults.state;
                if (isFiled == 1 || state == 1) {
                    return;
                }
                var dtype = top.dtype || 'Course';
                if (dtype == "ZT" || dtype == "HB" || dtype == "MAG") {
                    var search = parent.location.search || '';
//				if (!/_from_=(\d+_){3}/.test(search)) {
//					return;
//				}
                    var uid = parent.getCookie('UID') ;
                    var objectId = config('objectid');
                    var type = 1;
                    var courseId = setting.defaults.courseid;
                    var chapterId = setting.defaults.knowledgeid;
                    var duration = window.duration;
                    var _from_ = GetQueryString('_from_');
                    var logUrl = location.protocol + '//data-xxt.aichaoxing.com/analysis/datalog?s='
                        + courseId + '&c=' + chapterId + '&o=' + objectId + '&st='
                        + st + '&m=' + type + '&d=' + duration * 1000 + '&u=' + uid +'&_from_=' + _from_;
                    var request = function(){
                        Ext.Ajax.request({
                            url : logUrl,
                            success : function(response) {
                            }
                        });
                    };
                    request();
                    if(st == 1){
                        playLogTimer && clearInterval(playLogTimer);
                        playLogTimer = setInterval(function(){
                            request();
                        },5000);
                    }else if(st == 2){
                        playLogTimer && clearInterval(playLogTimer);
                    }
                }
                $(".vjs-progress-holder.vjs-slider.vjs-slider-horizontal").attr("tabindex","-1")
            }catch(error){console.log(error)}
        }


        Ext.onReady(function(){
            var requestSatusResourceDownGrade = parent.requestSatusResourceDownGrade;
            if(requestSatusResourceDownGrade && requestSatusResourceDownGrade == 1){
                var tipImg ='<img src="/ananas/css/downgradeTip_audio.png" width="676" height="100">';
                Ext.select('body').setHTML(tipImg);
                return;
            }
            request();
            //timer = setInterval(request, 5000);
        });
    </script>
